<!DOCTYPE html>
<div id="container"></div>
<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<script type="module">

d3.csv("https://gist.githubusercontent.com/haoshuai999/cc3ef2f964fa6918d1e207bc649f7b21/raw/ef432fd0baff43aa29352fbe48b3289c753dac35/fruits.csv").then((data) => {
    const container = document.getElementById("container");

    // Declare the chart dimensions and margins.
    const width = 928;
    const height = 500;
    const marginTop = 30;
    const marginRight = 10;
    const marginBottom = 30;
    const marginLeft = 40;

    // Prepare the scales for positional and color encodings.
    const xScale = d3.scaleBand()
        .domain(data.map(d => d.name))
        .range([marginLeft, width - marginRight])
        .padding(0.1);

    const yScale = d3.scaleLinear()
        .domain([0, d3.max(data, d => d.value)])
        .range([height - marginBottom, marginTop]);

    // Create the SVG container.
    const svg = d3.create("svg")
      .attr("width", width)
      .attr("height", height)
      .attr("viewBox", [0, 0, width, height]);

    const div = d3.create("div")
        .attr("class", "tooltip")
        .style("opacity", 1)
        .style("left", "50px")
        .style("top", "50px");

    // Add a rect for each bar.
    svg.append("g")
        .attr("fill", "steelblue")
    .selectAll()
    .data(data)
    .join("rect")
        .attr("x", (d) => xScale(d.name))
        .attr("y", (d) => yScale(d.value))
        .attr("height", (d) => yScale(0) - yScale(d.value))
        .attr("width", xScale.bandwidth())
        .on("mouseover touchmove", (event, d) => {
            d3.select(this)
                .transition()
                .duration(500)
                .attr("opacity", 0.5);
                
            div.transition()
                .duration(500)
                .style("opacity", 1);


            div.html(`${d.name}: <br>${d.value}`)
                .style("left", (event.pageX + 10) + "px")
                .style("top", (event.pageY - 15) + "px");
        })
        .on("mouseout touchcancel", (event, d) => {
            d3.select(this)
                .transition()
                .duration(500)
                .attr("opacity", 1);

            div.transition()
                .duration(500)
                .style("opacity", 0);
        });

    svg.append("g")
        .selectAll()
        .data(data)
        .join("text")
        .attr("x", (d) => xScale(d.name) + xScale.bandwidth() / 2)
        .attr("y", (d) => yScale(d.value) - 5)
        .attr("text-anchor", "middle")
        .text(d => d.value);

    // Add the x-axis and label.
    svg.append("g")
      .attr("transform", `translate(0,${height - marginBottom})`)
      .call(d3.axisBottom(xScale).tickSizeOuter(0));

    // Add the y-axis and label, and remove the domain line.
    svg.append("g")
      .attr("transform", `translate(${marginLeft},0)`)
      .call(d3.axisLeft(yScale))
      .call(g => g.select(".domain").remove())
      .call(g => g.append("text")
          .attr("x", -10)
          .attr("y", 10)
          .attr("fill", "currentColor")
          .attr("text-anchor", "end")
          .text("Value"));

    container.append(svg.node());
    container.append(div.node());
});


</script>

<style>
    .tooltip {
         position: absolute;
         text-align: center;
         padding: 5px;
         background: #FFFFFF;
         color: #313639;
         border: 1px solid #313639;
         border-radius: 8px;
         pointer-events: none;
         font-size: 15px;
    }
</style>
