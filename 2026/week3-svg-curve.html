<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>My test page</title>
    <!-- D3 for scales only -->
    <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  </head>
  <body>
    <svg id="bar-chart" width="520" height="240" viewBox="0 0 520 240"></svg>

    <svg width="400" height="400" viewBox="0 -100 400 300">
      <!-- Q: quadratic bezier — one control point at (60,-40) 
       Curve bends toward (60,-40) but doesn't touch it -->
      <path d="M 20,150 Q 60,-50 100,150" fill="none" stroke="blue" stroke-width="3" />

      <circle cx="60" cy="-50" r="5" fill="blue" />

      <!-- C: cubic bezier — two control points at (180,20) and (220,20)
         Both pull the middle of the curve upward, similar shape to the Q above
         since the two control points are close together and on the same side -->
      <path d="M 160,150 C 180,20 220,20 240,150" fill="none" stroke="green" stroke-width="3" />

      <circle cx="180" cy="20" r="5" fill="green" />
      <circle cx="220" cy="20" r="5" fill="green" />

      <!-- A: elliptical arc — rx=90 ry=900
        0 = no rotation, 0 = small arc, 1 = sweep clockwise -->
      <path d="M 300,150 A 90 900 0 0 1 380,150" fill="none" stroke="red" stroke-width="3" />
    </svg>
    <svg width="200" height="200" viewBox="-200 -200 400 400">
      <g transform="scale(2)">
        <g transform="rotate(0)" id="arm">
          <polygon points="0,0 36,-50 0,-100" fill="#EDD8B7" />
          <polygon points="0,0 -36,-50 0,-100" fill="#E5C39C" />
        </g>
        <use href="#arm" transform="rotate(72)" />
        <use href="#arm" transform="rotate(144)" />
        <use href="#arm" transform="rotate(-72)" />
        <use href="#arm" transform="rotate(-144)" />
      </g>
    </svg>
    <svg width="200" height="200" viewBox="-100 -100 200 200">
      <path id="branch" d="
        M 0 0 Q 10 10 10 20
        M 0 -20 L 20 -34
        M 0 -20 L -20 -34
        M 0 -40 L 20 -54
        M 0 -40 L -20 -54
        M 0 -60 L 20 -74
        M 0 -60 L -20 -74
      "
      stroke="#E5C39C" stroke-width="5"
      />
      <use href="#branch" transform="rotate(60)" />
      <use href="#branch" transform="rotate(120)" />
      <use href="#branch" transform="rotate(180)" />
      <use href="#branch" transform="rotate(240)" />
      <use href="#branch" transform="rotate(300)" />
    </svg>
    <script>
      const data = [
        { name: "Mon", value: 12 },
        { name: "Tue", value: 19 },
        { name: "Wed", value: 7 },
        { name: "Thu", value: 15 },
        { name: "Fri", value: 22 },
        { name: "Sat", value: 10 },
        { name: "Sun", value: 17 }
      ];

      const svg = document.getElementById("bar-chart");
      const width = 520;
      const height = 240;
      const margin = { top: 16, right: 16, bottom: 20, left: 16 };

      const innerWidth = width - margin.left - margin.right;
      const innerHeight = height - margin.top - margin.bottom;

      const x = d3.scaleBand()
        .domain(data.map(d => d.name))
        .range([0, innerWidth])
        .padding(0.2);

      const y = d3.scaleLinear()
        .domain([0, d3.max(data, d => d.value)])
        .nice()
        .range([innerHeight, 0]);

      const NS = "http://www.w3.org/2000/svg";

      const g = document.createElementNS(NS, "g");

      g.setAttribute("transform", `translate(${margin.left},${margin.top})`);
      svg.append(g);

      data.forEach(d => {
        const rect = document.createElementNS(NS, "rect");
        rect.setAttribute("x", x(d.name));
        rect.setAttribute("y", y(d.value));
        rect.setAttribute("width", x.bandwidth());
        rect.setAttribute("height", innerHeight - y(d.value));
        rect.setAttribute("rx", "4");
        rect.setAttribute("fill", "#4e79a7");
        g.appendChild(rect);

        const label = document.createElementNS(NS, "text");
        label.setAttribute("x", x(d.name) + x.bandwidth() / 2);
        label.setAttribute("y", y(d.value) - 6);
        label.setAttribute("text-anchor", "middle");
        label.setAttribute("font-size", "11");
        label.setAttribute("fill", "#2b2b2b");
        label.textContent = d.value;
        g.appendChild(label);
      })
    </script>
  </body>
</html>
